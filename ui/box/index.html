<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/favicon.ico">
  <title>Cerehub Box</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    textarea { width: 100%; height: 110px; }
    button { margin-top: 12px; padding: 8px 14px; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; white-space: pre-wrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
    .status { margin-top: 12px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Cerehub Box</h1>
  <p>Simple validation chat UI for core.</p>

  <label for="message">Request</label>
  <textarea id="message">Create a schedule assistant for my family</textarea><br>

  <button onclick="send()">Send</button>
  <button onclick="refreshProgress()">Refresh Progress</button>
  <button onclick="toggleAutoProgress()">Toggle Auto Progress</button>

  <div class="status" id="status">Idle</div>

  <div class="grid">
    <div>
      <h3>Reply</h3>
      <pre id="reply"></pre>
    </div>
    <div>
      <h3>Latest Progress</h3>
      <pre id="latestProgress"></pre>
    </div>
  </div>

  <h3>Progress Events</h3>
  <pre id="progress"></pre>

  <h3>Raw Result</h3>
  <pre id="raw"></pre>

  <script>
    let progressTimer = null;

    function resetRunView() {
      document.getElementById('reply').textContent = '';
      document.getElementById('latestProgress').textContent = '';
      document.getElementById('progress').textContent = '';
      document.getElementById('raw').textContent = '';
    }

    async function send() {
      const messageEl = document.getElementById('message');
      if (!(messageEl instanceof HTMLTextAreaElement)) return;

      const text = messageEl.value;
      resetRunView();
      setStatus('Running...');
      await refreshProgress();
      startAutoProgress();

      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({text, session_id: 'box-demo', locale: 'en'})
        });

        const data = await res.json();
        document.getElementById('reply').textContent = data.reply || '';
        document.getElementById('raw').textContent = JSON.stringify(data, null, 2);
        setStatus('Done');
      } catch (err) {
        document.getElementById('raw').textContent = String(err);
        setStatus('Failed');
      } finally {
        await refreshProgress();
      }
    }

    async function refreshProgress() {
      try {
        const latestRes = await fetch('/api/progress/latest');
        const latestData = await latestRes.json();
        document.getElementById('latestProgress').textContent =
          JSON.stringify(latestData.latest || {}, null, 2);

        const res = await fetch('/api/progress?limit=100');
        const data = await res.json();
        document.getElementById('progress').textContent =
          JSON.stringify(data.events || [], null, 2);
      } catch (err) {
        document.getElementById('progress').textContent =
          'Progress API not available: ' + String(err);
      }
    }

    function startAutoProgress() {
      if (progressTimer) return;
      progressTimer = window.setInterval(refreshProgress, 1000);
    }

    function stopAutoProgress() {
      if (!progressTimer) return;
      window.clearInterval(progressTimer);
      progressTimer = null;
    }

    function toggleAutoProgress() {
      if (progressTimer) {
        stopAutoProgress();
        setStatus('Auto progress stopped');
      } else {
        startAutoProgress();
        setStatus('Auto progress started');
      }
    }

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    refreshProgress();
  </script>
</body>
</html>
