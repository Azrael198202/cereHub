<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cerehub App</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    textarea { width: 100%; height: 110px; }
    button { margin-top: 12px; padding: 8px 14px; }
    pre { background: #f5f5f5; padding: 12px; overflow: auto; white-space: pre-wrap; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>Cerehub App</h1>
  <p>Workflow and trace inspector.</p>
  <label for="message">Request</label>
  <textarea id="message">Create a calendar tool</textarea><br>
  <button onclick="runCore()">Run Core</button>
  <div class="grid">
    <div><h3>Intent</h3><pre id="intent"></pre></div>
    <div><h3>Workflow</h3><pre id="workflow"></pre></div>
    <div><h3>Traces</h3><pre id="traces"></pre></div>
    <div><h3>Artifacts</h3><pre id="artifacts"></pre></div>
  </div>
  <script>
    async function runCore() {
      const messageEl = document.getElementById('message');
      if (!(messageEl instanceof HTMLTextAreaElement)) return;
      const text = messageEl.value;
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text, session_id: 'app-demo', locale: 'en'})
      });
      const data = await res.json();
      document.getElementById('intent').textContent = JSON.stringify(data.intent, null, 2);
      document.getElementById('workflow').textContent = JSON.stringify(data.workflow, null, 2);
      document.getElementById('traces').textContent = JSON.stringify(data.traces, null, 2);
      document.getElementById('artifacts').textContent = JSON.stringify(data.artifacts, null, 2);
    }
  </script>
</body>
</html>
